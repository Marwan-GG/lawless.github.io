<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MG. Lawless | Portfolio</title>
  <style>
    :root {
      /* This variable is synced to the Galaxy Core color via JS */
      --accent: #ff3366;
      --text-dim: #666;
    }
    
    body { 
      margin: 0; 
      background: #000; 
      font-family: 'Inter', -apple-system, sans-serif; 
      color: white;
      overflow-x: hidden;
    }

    canvas { 
      display: block; 
      position: fixed; 
      top: 0; 
      left: 0; 
      z-index: 1; 
    }
    
    /* Navigation Area */
    .main-nav { 
      position: fixed; 
      top: 40px; 
      left: 40px; 
      z-index: 10; 
      display: flex; 
      flex-direction: column; 
      gap: 20px; 
    }

    .nav-logo { 
      font-weight: 800; 
      font-size: 1.2rem; 
      letter-spacing: 3px; 
      text-transform: uppercase; 
      border-left: 3px solid var(--accent); 
      padding-left: 15px; 
      transition: border-color 0.3s ease;
    }

    .nav-links { 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
      font-size: 0.85rem; 
      color: var(--text-dim); 
    }

    .nav-links span, .copy-link { 
      cursor: pointer; 
      transition: 0.3s ease; 
      width: fit-content; 
    }

    .nav-links span:hover, .copy-link:hover { 
      color: #fff; 
      transform: translateX(5px);
    }

    /* Copy Link Styled as Nav Item */
    .copy-link {
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .copy-link .status {
      display: none;
      color: #4ade80;
      font-weight: bold;
    }

    .copy-link.copied .status { display: inline; }
    .copy-link.copied .label { display: none; }

    /* Centered Typewriter Text */
    .header-center {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      color: var(--accent);
      font-size: 1.1rem;
      pointer-events: none;
      white-space: nowrap;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.2rem;
      background: var(--accent);
      margin-left: 5px;
      animation: blink 1s infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Scrollable Sections */
    .content-wrapper { position: relative; z-index: 2; width: 100%; }
    section { height: 100vh; }

    .lil-gui { z-index: 100; }
  </style>
</head>
<body>

  <div class="header-center">
    <span id="typewriter"></span><span class="cursor"></span>
  </div>

  <nav class="main-nav">
    <div class="nav-logo">MG. Lawless</div>
    <div class="nav-links">
      <span>Home</span>
      <span>Works</span>
      <span>Blog</span>
      <div class="copy-link" id="copyEmail">
        <span class="label">Copy Email</span>
        <span class="status">Email Copied ✓</span>
      </div>
    </div>
  </nav>

  <div class="content-wrapper">
    <section id="home"></section>
    <section id="works"></section>
    <section id="blog"></section>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GUI } from 'lil-gui';

    // --- TYPEWRITER LOGIC ---
    const text = "Welcome Traveller";
    const typewriterElement = document.getElementById('typewriter');
    let charIndex = 0;

    function type() {
      if (charIndex < text.length) {
        typewriterElement.textContent += text.charAt(charIndex);
        charIndex++;
        setTimeout(type, 100);
      }
    }
    type();

    // --- EMAIL LOGIC ---
    const emailBtn = document.getElementById('copyEmail');
    const myEmail = 'maroggebriel@gmail.com';

    emailBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(myEmail).then(() => {
        emailBtn.classList.add('copied');
        setTimeout(() => emailBtn.classList.remove('copied'), 2000);
      });
    });

    // --- THREE.JS GALAXY ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 6, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const params = {
      count: 70000,
      radius: 12,
      branches: 3,
      spin: 1,
      randomness: 0.3,
      insideColor: '#ff3366',
      outsideColor: '#3366ff'
    };

    let geometry, material, points = null;

    // Helper to sync CSS accent with the Galaxy core
    const syncAccentColor = () => {
      document.documentElement.style.setProperty('--accent', params.insideColor);
    };

    const generateGalaxy = () => {
      if(points !== null) {
        geometry.dispose();
        material.dispose();
        scene.remove(points);
      }

      geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(params.count * 3);
      const colors = new Float32Array(params.count * 3);
      const colorInside = new THREE.Color(params.insideColor);
      const colorOutside = new THREE.Color(params.outsideColor);

      for(let i = 0; i < params.count; i++) {
        const i3 = i * 3;
        const radius = Math.random() * params.radius;
        const spinAngle = radius * params.spin;
        const branchAngle = (i % params.branches) / params.branches * Math.PI * 2;

        const randomX = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;
        const randomY = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;
        const randomZ = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;

        positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
        positions[i3 + 1] = randomY;
        positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

        const mixedColor = colorInside.clone().lerp(colorOutside, radius / params.radius);
        colors[i3] = mixedColor.r;
        colors[i3 + 1] = mixedColor.g;
        colors[i3 + 2] = mixedColor.b;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      material = new THREE.PointsMaterial({
        size: 0.015,
        sizeAttenuation: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        vertexColors: true
      });

      points = new THREE.Points(geometry, material);
      scene.add(points);
      syncAccentColor(); // Sync on build
    };

    generateGalaxy();

    // --- GUI SETUP ---
    const gui = new GUI();
    // onChange makes it sync in real-time as you drag the picker
    gui.addColor(params, 'insideColor').name('Core Color').onChange(syncAccentColor).onFinishChange(generateGalaxy);
    gui.addColor(params, 'outsideColor').name('Edge Color').onFinishChange(generateGalaxy);
    gui.close();

    function animate() {
      requestAnimationFrame(animate);
      if (points) points.rotation.y += 0.0005;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
