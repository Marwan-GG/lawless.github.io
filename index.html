<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M. Lawless | Portfolio</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
    
    .main-nav {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 10;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 15px;
      pointer-events: auto;
    }

    .nav-logo {
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-left: 2px solid #ff3366;
      padding-left: 10px;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.75rem;
      color: #666;
    }

    .nav-links span { cursor: pointer; transition: 0.3s; width: fit-content; }
    .nav-links span:hover { color: #fff; padding-left: 5px; }
  </style>
</head>
<body>

  <nav class="main-nav">
    <div class="nav-logo">M. Lawless</div>
    <div class="nav-links">
      <span>INDEX</span>
      <span>ARCHIVE</span>
      <span>INFO</span>
    </div>
  </nav>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/",
        "three/tsl": "https://unpkg.com/three@0.170.0/build/three.tsl.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import WebGPU from 'three/addons/capabilities/WebGPU.js';
    import WebGPURenderer from 'three/addons/renderers/webgpu/WebGPURenderer.js';

    let camera, scene, renderer, points;

    init();

    async function init() {
      const isMobile = window.innerWidth < 768;
      const count = isMobile ? 20000 : 60000;

      camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 8, 12);
      camera.lookAt(0, 0, 0);

      scene = new THREE.Scene();

      // Geometry Generation
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);

      for (let i = 0; i < count; i++) {
        const i3 = i * 3;
        const radius = Math.random() * 10;
        const spinAngle = radius * 4;
        const branchAngle = (i % 3) * ((Math.PI * 2) / 3);

        const randomX = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * 0.5;
        const randomY = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * 0.3;
        const randomZ = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * 0.5;

        positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
        positions[i3 + 1] = randomY;
        positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

        const colorInside = new THREE.Color('#ff3366');
        const colorOutside = new THREE.Color('#3366ff');
        const mixedColor = colorInside.clone().lerp(colorOutside, radius / 10);
        
        colors[i3] = mixedColor.r;
        colors[i3 + 1] = mixedColor.g;
        colors[i3 + 2] = mixedColor.b;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      // --- RENDERER & MATERIAL SELECTION ---
      if (WebGPU.isAvailable()) {
        const { time, vec3, uniform } = await import('three/tsl');
        
        renderer = new WebGPURenderer({ antialias: true });
        
        const material = new THREE.PointsNodeMaterial({
          transparent: true,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          sizeAttenuation: true
        });

        // TSL Animations
        const twinkle = time.mul(3).sin().mul(0.5).add(0.5);
        material.sizeNode = uniform(0.08).mul(twinkle);
        material.colorNode = vec3(THREE.MathUtils.randFloat(0.8, 1), 0.2, 0.5);

        points = new THREE.Points(geometry, material);
      } else {
        // Fallback for Mobile/Older Browsers
        renderer = new THREE.WebGLRenderer({ antialias: true });
        
        const material = new THREE.PointsMaterial({
          size: 0.05,
          vertexColors: true,
          transparent: true,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        });

        points = new THREE.Points(geometry, material);
        console.warn("WebGPU not available, using WebGL Fallback.");
      }

      scene.add(points);

      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      animate();
      window.addEventListener('resize', onWindowResize);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      points.rotation.y += 0.001;
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
