<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MG. Lawless | Portfolio</title>
  <style>
    :root {
      --accent: #ff3366;
      --text-dim: #666;
    }
    
    body { 
      margin: 0; 
      background: #000; 
      font-family: 'Inter', -apple-system, sans-serif; 
      color: white;
      overflow-x: hidden;
    }

    /* 3D Background Fixed */
    canvas { 
      display: block; 
      position: fixed; 
      top: 0; 
      left: 0; 
      z-index: 1; 
    }
    
    /* Navigation */
    .main-nav { 
      position: fixed; 
      top: 40px; 
      left: 40px; 
      z-index: 10; 
      display: flex; 
      flex-direction: column; 
      gap: 20px; 
    }

    .nav-logo { 
      font-weight: 800; 
      font-size: 1.2rem; 
      letter-spacing: 3px; 
      text-transform: uppercase; 
      border-left: 2px solid var(--accent); 
      padding-left: 15px; 
    }

    .nav-links { 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
      font-size: 0.85rem; 
      color: var(--text-dim); 
    }

    .nav-links span { 
      cursor: pointer; 
      transition: 0.3s ease; 
      width: fit-content; 
    }

    .nav-links span:hover { 
      color: #fff; 
      transform: translateX(5px);
    }

    /* Copy Email Button */
    .copy-btn {
      margin-top: 10px;
      padding: 8px 0;
      font-size: 0.75rem;
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      background: none;
      border: none;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .copy-btn .status {
      display: flex;
      align-items: center;
      gap: 5px;
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.3s ease;
      color: #4ade80; /* Green check color */
    }

    .copy-btn.copied .status {
      opacity: 1;
      transform: translateX(0);
    }

    .copy-btn.copied .label {
      display: none;
    }

    /* Scroll Content Sections */
    .content-wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
    }

    section {
      height: 100vh;
      display: flex;
      align-items: center;
      padding-left: 10%;
    }

    .hero-text h2 {
      font-size: clamp(2rem, 8vw, 5rem);
      margin: 0;
      opacity: 0.8;
    }

    /* lil-gui positioning */
    .lil-gui { z-index: 100; }
  </style>
</head>
<body>

  <nav class="main-nav">
    <div class="nav-logo">MG. Lawless</div>
    <div class="nav-links">
      <span>Home</span>
      <span>Works</span>
    </div>
    
    <button class="copy-btn" id="copyEmail">
      <span class="label">Copy Email</span>
      <span class="status">Email Copied ✓</span>
    </button>
  </nav>

  <div class="content-wrapper">
    <section id="home">
      <div class="hero-text">
        </div>
    </section>
    
    <section id="works">
      </section>
    
    <section id="extra">
       </section>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GUI } from 'lil-gui';

    // --- EMAIL LOGIC ---
    const emailBtn = document.getElementById('copyEmail');
    const myEmail = 'maroggebriel@gmail.com';

    emailBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(myEmail).then(() => {
        emailBtn.classList.add('copied');
        setTimeout(() => {
          emailBtn.classList.remove('copied');
        }, 2000);
      });
    });

    // --- THREE.JS GALAXY ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 6, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const params = {
      count: 70000,
      radius: 12,
      branches: 3,
      spin: 1,
      randomness: 0.3,
      insideColor: '#ff3366',
      outsideColor: '#3366ff'
    };

    let geometry, material, points = null;

    const generateGalaxy = () => {
      if(points !== null) {
        geometry.dispose();
        material.dispose();
        scene.remove(points);
      }

      geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(params.count * 3);
      const colors = new Float32Array(params.count * 3);
      const colorInside = new THREE.Color(params.insideColor);
      const colorOutside = new THREE.Color(params.outsideColor);

      for(let i = 0; i < params.count; i++) {
        const i3 = i * 3;
        const radius = Math.random() * params.radius;
        const spinAngle = radius * params.spin;
        const branchAngle = (i % params.branches) / params.branches * Math.PI * 2;

        const randomX = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;
        const randomY = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;
        const randomZ = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;

        positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
        positions[i3 + 1] = randomY;
        positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

        const mixedColor = colorInside.clone().lerp(colorOutside, radius / params.radius);
        colors[i3] = mixedColor.r;
        colors[i3 + 1] = mixedColor.g;
        colors[i3 + 2] = mixedColor.b;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      material = new THREE.PointsMaterial({
        size: 0.015,
        sizeAttenuation: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        vertexColors: true
      });

      points = new THREE.Points(geometry, material);
      scene.add(points);
    };

    generateGalaxy();

    // --- GUI (Colors only) ---
    const gui = new GUI();
    gui.addColor(params, 'insideColor').name('Core Color').onFinishChange(generateGalaxy);
    gui.addColor(params, 'outsideColor').name('Edge Color').onFinishChange(generateGalaxy);
    gui.close();

    function animate() {
      requestAnimationFrame(animate);
      if (points) points.rotation.y += 0.0005;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
