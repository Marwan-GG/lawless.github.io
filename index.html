<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Desert Pixel Portfolio</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
    canvas { display: block; }
    
    .main-nav {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 10;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 15px;
      pointer-events: auto;
    }

    .nav-logo {
      font-weight: bold;
      font-size: 1.1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-left: 2px solid #ffaa00; /* Warm golden border */
      padding-left: 10px;
      margin-bottom: 10px;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 0.85rem;
      color: #bbb;
    }

    .nav-links span {
      cursor: pointer;
      transition: all 0.3s ease;
      width: fit-content;
    }

    .nav-links span:hover {
      color: #fff;
      padding-left: 5px;
    }

    .lil-gui { --width: 300px; z-index: 11; }
  </style>
</head>
<body>

  <nav class="main-nav">
    <div class="nav-logo">M. Lawless</div>
    <div class="nav-links">
      <span>Project 01</span>
      <span>Project 02</span>
      <span>About</span>
      <span>Contact</span>
    </div>
  </nav>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GUI } from 'lil-gui';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { RenderPixelatedPass } from 'three/addons/postprocessing/RenderPixelatedPass.js';

    // --- SCENE SETUP ---
    const scene = new THREE.Scene();
    // Desert Sunset Background Color
    scene.background = new THREE.Color(0xffa570); 

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(7, 4, 7);
    camera.lookAt(0, 1.5, 0); // Focus slightly higher

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Softer shadows
    document.body.appendChild(renderer.domElement);

    // --- POST-PROCESSING ---
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    // Pixel size 8 for a more pronounced "retro" desert feel
    const pixelatedPass = new RenderPixelatedPass(8, scene, camera);
    composer.addPass(pixelatedPass);

    // --- OBJECTS ---
    // Sand Floor
    const sandGeometry = new THREE.PlaneGeometry(100, 100, 10, 10);
    const sandMaterial = new THREE.MeshStandardMaterial({ 
      color: 0xc2b280, // Beige sand tone
      roughness: 0.9,
      metalness: 0.0
    });
    const floor = new THREE.Mesh(sandGeometry, sandMaterial);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Placeholder Object (Now Sand Color)
    const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
    const material = new THREE.MeshStandardMaterial({ 
      color: 0xd9b382, // Warm copper/sand tone
      metalness: 0.1, 
      roughness: 0.7 
    });
    const torusKnot = new THREE.Mesh(geometry, material);
    // Start slightly high
    torusKnot.position.y = 2.5;
    torusKnot.castShadow = true;
    scene.add(torusKnot);

    // --- LIGHTS ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4); // Brighter ambient
    scene.add(ambientLight);

    // Golden Sunset Spotlight
    const spotLight = new THREE.SpotLight(0xffddaa, 600); 
    spotLight.position.set(5, 12, 5);
    spotLight.angle = 0.5;
    spotLight.penumbra = 0.3;
    spotLight.decay = 2;
    spotLight.distance = 100;
    spotLight.castShadow = true;
    
    // Improve shadow quality
    spotLight.shadow.mapSize.width = 1024;
    spotLight.shadow.mapSize.height = 1024;
    
    scene.add(spotLight);
    spotLight.target = torusKnot;

    // --- GUI MENU SETUP ---
    const gui = new GUI();
    const pixelFolder = gui.addFolder('Pixel Settings');
    pixelFolder.add(pixelatedPass, 'pixelSize', 1, 32, 1).name('Pixel Density');

    const sceneFolder = gui.addFolder('Desert Scene');
    sceneFolder.addColor(scene, 'background').name('Sky Color');
    sceneFolder.addColor(sandMaterial, 'color').name('Sand Color');

    const lightFolder = gui.addFolder('Spotlight Settings');
    lightFolder.addColor(spotLight, 'color').name('Sun Color');
    lightFolder.add(spotLight, 'intensity', 0, 3000);

    // --- ANIMATION WITH SAND INTERACTION ---
    const clock = new THREE.Clock(); // Required to track time for smooth animation

    function animate() {
      requestAnimationFrame(animate);
      const elapsedTime = clock.getElapsedTime();

      // Slow continuous rotation
      torusKnot.rotation.y += 0.005;

      // 1. BOUNCE: Subtle vertical movement (using cosine for smooth up/down)
      const bobOffset = Math.cos(elapsedTime * 0.5) * 0.15; 

      // 2. SINK: Slowly decrease base height over time (starts at 2.5, targets 0.5)
      // This makes the object look like it's getting heavy and sinking.
      const sinkSpeed = 0.015;
      const targetBaseY = 0.5;
      const baseHeight = THREE.MathUtils.lerp(torusKnot.position.y, targetBaseY, sinkSpeed * 0.05);

      // Apply combined motion
      torusKnot.position.y = baseHeight + bobOffset;

      // CRITICAL: Post-Processing Render
      composer.render();
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
