<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Works | MG. Lawless</title>
  <link rel="icon" type="image/jpeg" href="https://cdn.discordapp.com/attachments/1186625565168500796/1491112293696536607/634fc7589ecb8b3229528763c2a246a1.jpg">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #26c9df;
      --text-dim: #666;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { 
      background: #000; 
      font-family: 'Inter', -apple-system, sans-serif; 
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #transition-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 9999;
      pointer-events: none;
      transition: opacity 0.6s ease-in-out;
    }

    /* Navigation */
    .main-nav { 
      position: fixed; 
      top: 40px; 
      left: 40px; 
      z-index: 10; 
      display: flex; 
      flex-direction: column; 
      gap: 20px; 
    }

    .nav-logo { 
      font-weight: 800; 
      font-size: 1.2rem; 
      letter-spacing: 3px; 
      text-transform: uppercase; 
      border-left: 3px solid var(--accent); 
      padding-left: 15px; 
    }

    .nav-links { 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
      font-size: 0.85rem; 
      color: var(--text-dim); 
    }

    .nav-links a { 
      text-decoration: none;
      color: inherit;
      cursor: pointer; 
      transition: 0.3s ease; 
      width: fit-content; 
    }

    .nav-links a:hover { 
      color: #fff; 
      transform: translateX(5px);
    }

    /* Copy Link Logic */
    .copy-link {
      color: var(--accent);
      cursor: pointer;
      position: relative;
      height: 1.2rem; 
      display: flex;
      align-items: center;
      transition: color 0.4s ease-in-out, transform 0.3s ease;
      width: fit-content;
    }
    .copy-link:hover { transform: translateX(5px); }
    .copy-link .status { 
      position: absolute; left: 0; opacity: 0; color: #4ade80; font-weight: bold;
      pointer-events: none; white-space: nowrap; transform: translateY(5px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .copy-link.copied .label { opacity: 0; transform: translateY(-5px); }
    .copy-link.copied .status { opacity: 1; transform: translateY(0); }

    /* Footer Styles */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 10;
      padding: 30px;
      text-align: center;
      pointer-events: none;
    }

    .footer-content {
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .social-links {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .social-icon {
      width: 24px;
      height: 24px;
      stroke: #444; 
      fill: none;
      transition: all 0.3s ease-in-out;
      filter: drop-shadow(0 0 0px transparent);
    }
    
    /* ICON GLOW ONLY */
    .social-links a:hover .social-icon { 
      stroke: #fff; 
      transform: translateY(-3px);
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6));
    }

    .footer-text {
      font-size: 0.65rem;
      color: #444; 
      letter-spacing: 2px;
      text-transform: uppercase;
      /* Notice: No transition or hover effect added here */
    }

    /* Content wrapper */
    .content-wrapper { 
      position: relative; 
      z-index: 2; 
      width: 100%; 
      padding-top: 100px;
      padding-bottom: 150px; 
    }

    .works-container {
      max-width: 50%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 150px;
    }

    .project-entry { width: 100%; }
    .project-title { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 2.2rem; margin-bottom: 8px; }
    .project-tagline { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 2px; }
    
    .project-media-grid {
      display: grid;
      grid-template-columns: 1fr 1fr; 
      gap: 15px;
      margin-bottom: 25px;
    }
    .project-media-grid img {
      width: 100%;
      height: auto;
      border: 1px solid #1a1a1a;
      border-radius: 4px;
    }
    .project-description { color: #aaa; font-size: 1rem; line-height: 1.8; }

    @media (max-width: 768px) {
      .main-nav { top: auto; bottom: 120px; left: 20px; }
      .works-container { max-width: 90%; }
    }
  </style>
</head>
<body>

  <div id="transition-overlay"></div>

  <nav class="main-nav">
    <div class="nav-logo">MG. Lawless</div>
    <div class="nav-links">
      <a href="./" class="transition-link">Home</a>
      <a href="works.html" class="transition-link" style="color: #fff;">Works</a>
      <a href="blog.html" class="transition-link">Blog</a>
      <div class="copy-link" id="copyEmail">
        <span class="label">Copy Email</span>
        <span class="status">Email Copied ✓</span>
      </div>
    </div>
  </nav>

  <div class="content-wrapper">
    <main class="works-container">
      <section class="project-entry">
        <h1 class="project-title">PROJECT ALPHA</h1>
        <p class="project-tagline">Visual Design / 2026</p>
        <div class="project-media-grid">
          <img src="https://via.placeholder.com/800x450" alt="Work">
          <img src="https://via.placeholder.com/800x450" alt="Work">
        </div>
        <p class="project-description">Hover the icons below to see the glow.</p>
      </section>
    </main>
  </div>

  <footer>
    <div class="footer-content">
      <div class="social-links">
        <a href="https://www.youtube.com/@lawless-mg" target="_blank">
          <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2C1 8.14 1 12 1 12s0 3.86.46 5.58a2.78 2.78 0 0 0 1.94 2c1.72.42 8.6.42 8.6.42s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2C23 15.86 23 12 23 12s0-3.86-.46-5.58z"></path>
            <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon>
          </svg>
        </a>
        <a href="https://steamcommunity.com/id/gunslinging1/" target="_blank">
          <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 24C5.385 24 0 18.615 0 12S5.385 0 12 0s12 5.385 12 12-5.385 12-12 12zM5.57 15.312c.181.56.516 1.057.962 1.428l2.977 4.195c.2.282.528.453.878.465a1.08 1.08 0 0 0 .918-.541l2.583-4.423a3.52 3.52 0 0 0 1.348-.157l4.496 2.002a.545.545 0 0 0 .736-.264l.872-1.96a.545.545 0 0 0-.265-.737l-4.475-1.99a3.535 3.535 0 0 0 .114-2.887 3.535 3.535 0 0 0-4.475-1.99l-2.002-4.496a.545.545 0 0 0-.737-.265l-1.96.872a.545.545 0 0 0-.264.737l2.002 4.496a3.535 3.535 0 0 0-3.708 6.185z"></path>
            <circle cx="12" cy="12" r="1.5"></circle>
          </svg>
        </a>
      </div>
      <div class="footer-text">©2026 / All Right Reserved / LAWLESS / MARWAN GEBRIEL</div>
    </div>
  </footer>

  <script>
    // FADE & NAV LOGIC
    window.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('transition-overlay');
      setTimeout(() => { overlay.style.opacity = '0'; }, 100);

      document.querySelectorAll('.transition-link').forEach(link => {
        link.addEventListener('click', (e) => {
          if (link.getAttribute('href') === window.location.pathname.split('/').pop()) return;
          e.preventDefault();
          const target = link.href;
          overlay.style.opacity = '1';
          setTimeout(() => { window.location.href = target; }, 600);
        });
      });
    });

    // EMAIL LOGIC
    const emailBtn = document.getElementById('copyEmail');
    const myEmail = 'maroggebriel@gmail.com';
    emailBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(myEmail).then(() => {
        emailBtn.classList.add('copied');
        setTimeout(() => emailBtn.classList.remove('copied'), 2000);
      });
    });
  </script>
</body>
</html>
